name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Ruff check
        run: uvx ruff check src/ tests/

      - name: Ruff format check
        run: uvx ruff format --check src/ tests/

      - name: Mypy type check (strict modules)
        run: >-
          uvx --with xxhash --with unidecode --with pendulum mypy
          src/swingmusic/utils/hashing.py
          src/swingmusic/utils/dates.py
          src/swingmusic/utils/parsers.py
          src/swingmusic/utils/__init__.py
          src/swingmusic/lib/playlist_maintenance.py
          --config-file pyproject.toml

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      # Minimal, hand-picked dependency set. The heavy deps (Flask / SQLAlchemy /
      # mutagen / Pillow) are mocked at import time by the test modules
      # themselves, so they are intentionally NOT installed here. Coverage uses a
      # stable whole-package denominator (see [tool.coverage.run] in
      # pyproject.toml); the floor only guards against gross test removal.
      - name: Run unit tests
        run: >-
          uvx --with xxhash --with unidecode --with pendulum --with requests
          --with pytest-cov
          pytest tests/ -v
          --cov --cov-report=term-missing --cov-fail-under=10
