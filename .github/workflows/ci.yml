name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Ruff check
        run: uvx ruff check src/ tests/

      - name: Ruff format check
        run: uvx ruff format --check src/ tests/

      - name: Mypy type check (strict modules)
        run: >-
          uvx --with xxhash --with unidecode --with pendulum mypy
          src/swingmusic/utils/hashing.py
          src/swingmusic/utils/dates.py
          src/swingmusic/utils/parsers.py
          src/swingmusic/utils/__init__.py
          src/swingmusic/lib/playlist_maintenance.py
          --config-file pyproject.toml

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      # Hand-picked dependency set. The truly heavy deps (Flask / SQLAlchemy /
      # Pillow) are mocked at import time by the test modules themselves, so they
      # are intentionally NOT installed. mutagen + tinytag ARE installed: they are
      # pure-Python (no libev/bjoern build) and the real-bytes tag round-trip test
      # needs them. conftest pre-imports them so the sibling fallback mocks no-op.
      # Coverage uses a stable whole-package denominator (see [tool.coverage.run]
      # in pyproject.toml); the floor only guards against gross test removal.
      - name: Run unit tests
        run: >-
          uvx --with xxhash --with unidecode --with pendulum --with requests
          --with 'mutagen<2' --with 'tinytag<3' --with pytest-cov
          pytest tests/ -v
          --cov --cov-report=term-missing --cov-fail-under=10

  api:
    name: API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      # bjoern (WSGI server) is a hard dependency and needs libev to build.
      - name: Install libev
        run: sudo apt-get update && sudo apt-get install -y libev-dev

      - name: Install dependencies
        run: uv sync

      # Full-stack request-cycle tests (real flask_openapi3, real request
      # models). This lane exists because the request-model layer broke twice
      # in one day (#36 -> #167/#39) in ways no mocked unit test could see:
      # multipart optionality and file mapping only misbehave in real requests.
      - name: Run API tests
        run: uv run --with pytest pytest tests_api/ -v
